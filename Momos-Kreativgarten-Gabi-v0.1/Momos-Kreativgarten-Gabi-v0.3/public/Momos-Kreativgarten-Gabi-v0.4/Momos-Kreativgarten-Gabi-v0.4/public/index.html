<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Momos Kreativgarten</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main>
<header>
<button class="logo" onclick="home()">🌿 Momos Kreativgarten</button>
<span>Gabis persönlicher Kreativort</span>
</header>
<section id="start" class="start">
<div class="hero">
<div class="cat">
<video src="momo-animiert.mp4" poster="momo.png" autoplay muted loop playsinline aria-label="Momo, die graue Katze, im sonnigen Garten"></video>
<i>
</i>
</div>
<div>
<p class="eyebrow">HALLO GABI, ICH BIN MOMO</p>
<h1>Was möchten wir<br>heute Schönes machen?</h1>
<p class="lead">Schön, dass du da bist! Wähle einfach einen Bereich aus. Ich helfe dir Schritt für Schritt – ganz ohne Technik-Kauderwelsch.</p>
</div>
</div>
<div class="tiles">
<button onclick="openTool('card')">
<b>🎨</b>
<strong>Kartenatelier</strong>
<small>Bilder und Grüße für jeden Anlass</small>
</button>
<button onclick="openTool('free')">
<b>✨</b>
<strong>Freies Atelier</strong>
<small>Einfach frei beschreiben, was Momo malen soll</small>
</button>
<button onclick="openTool('poem')">
<b>✍️</b>
<strong>Gedichtstube</strong>
<small>Persönliche Worte, die von Herzen kommen</small>
</button>
<button onclick="openTool('recipe')">
<b>🍲</b>
<strong>Momos Rezeptküche</strong>
<small>Kochen mit dem, was gerade da ist</small>
</button>
<button onclick="openTool('english')">
<b>🇬🇧</b>
<strong>Englisch mit Momo</strong>
<small>Entspannt sprechen und üben</small>
</button>
<button onclick="nature()">
<b>🐦</b>
<strong>Naturfenster</strong>
<small>Vogelfamilien und Tiere live beobachten</small>
</button>
<button onclick="books()">
<b>📚</b>
<strong>Lesegarten</strong>
<small>Bücher entdecken und merken</small>
</button>
<button onclick="openTool('music')">
<b>💃</b>
<strong>Musik & Bewegung</strong>
<small>Musik, Tanz und gute Laune</small>
</button>
<button onclick="travel()">
<b>🌍</b>
<strong>Reiseträume</strong>
<small>Orte entdecken und Ideen sammeln</small>
</button>
</div>
</section>
<section id="workspace" class="workspace hidden">
<button class="back" onclick="home()">← Zurück in den Garten</button>
<div class="toolhead">
<img src="momo.png">
<div>
<p class="eyebrow" id="overline">
</p>
<h2 id="title">
</h2>
<p id="intro">
</p>
</div>
</div>
<form id="form">
</form>
<div id="loading" class="loading hidden">Momo denkt nach … 🌿</div>
<article id="result" class="result hidden">
<div>
<b>Momos Idee</b>
<button onclick="copyResult()">Kopieren</button>
</div>
<pre id="output">
</pre>
</article>
</section>
</main>
<link rel="stylesheet" href="image.css">
<link rel="stylesheet" href="music.css">
<script src="app.js">
</script>
<script src="image.js">
</script>
<script src="music.js">
</script>
</body>
</html>
